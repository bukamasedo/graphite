name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-13
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install

      - name: Build MCP server binary
        shell: bash
        run: |
          cd mcp-server
          npm install
          node build.mjs

      - name: Place MCP binary for Tauri bundling
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.rust_target }}" = "x86_64-pc-windows-msvc" ]; then
            cp mcp-server/dist/graphite-mcp "src-tauri/binaries/graphite-mcp-${{ matrix.rust_target }}.exe"
          else
            cp mcp-server/dist/graphite-mcp "src-tauri/binaries/graphite-mcp-${{ matrix.rust_target }}"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Graphite ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get release info
        id: release
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dmg_url=https://github.com/bukamasedo/graphite/releases/download/${TAG}/Graphite_${VERSION}_aarch64.dmg" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute SHA256
        id: sha
        run: |
          curl -fSL "${{ steps.release.outputs.dmg_url }}" -o graphite.dmg
          SHA256=$(sha256sum graphite.dmg | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/bukamasedo/homebrew-tap.git" tap
          mkdir -p tap/Casks

          cat > tap/Casks/graphite-notes.rb <<RUBY
          cask "graphite-notes" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/bukamasedo/graphite/releases/download/v#{version}/Graphite_#{version}_aarch64.dmg"
            name "Graphite"
            desc "Local-first markdown note-taking app"
            homepage "https://github.com/bukamasedo/graphite"

            app "Graphite.app"

            zap trash: [
              "~/Library/Application Support/com.graphite.app",
              "~/Library/Caches/com.graphite.app",
              "~/Library/Preferences/com.graphite.app.plist",
            ]
          end
          RUBY

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/graphite-notes.rb
          git commit -m "Update graphite-notes to ${VERSION}"
          git push
