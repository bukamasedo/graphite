name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install

      - name: Download x86_64 Node for cross-arch SEA (macOS)
        if: matrix.rust_target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          NODE_VERSION=$(node -v)
          curl -fSL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-darwin-x64.tar.gz" -o /tmp/node-x64.tar.gz
          tar -xzf /tmp/node-x64.tar.gz -C /tmp
          echo "NODE_BINARY_PATH=/tmp/node-${NODE_VERSION}-darwin-x64/bin/node" >> "$GITHUB_ENV"

      - name: Build MCP server binary
        shell: bash
        run: |
          cd mcp-server
          npm install
          node build.mjs

      - name: Place MCP binary for Tauri bundling
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.rust_target }}" = "x86_64-pc-windows-msvc" ]; then
            cp mcp-server/dist/graphite-mcp "src-tauri/binaries/graphite-mcp-${{ matrix.rust_target }}.exe"
          else
            cp mcp-server/dist/graphite-mcp "src-tauri/binaries/graphite-mcp-${{ matrix.rust_target }}"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Graphite ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

